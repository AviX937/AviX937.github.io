<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Персональный сайт-портфолио.">
  <title>{{ page.title | default: "Ваше Имя" }}</title>
  <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">
</head>
<body class="font-mono">
  <header class="header" id="header">
    <div class="container header__inner">
      <a href="{{ '/' | relative_url }}" class="logo" data-i18n="logo">ИмяФамилия</a>
      <div class="header-nav" id="header-nav">
        <a href="{{ '/#about' | relative_url }}" data-i18n="nav.about">Обо мне</a>
        <a href="{{ '/#portfolio' | relative_url }}" data-i18n="nav.portfolio">Портфолио</a>
        <a href="{{ '/#contact' | relative_url }}" data-i18n="nav.contact">Контакты</a>
      </div>
      <div class="header-actions">
        <a href="{{ '/assets/resume_ru.pdf' | relative_url }}" download class="resume-link" data-i18n="nav.resume">Резюме</a>
        <button id="lang-toggle" class="lang-btn" aria-label="Switch language">EN</button>
      </div>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2025 Имя Фамилия</p>
    </div>
  </footer>

  <script src="{{ '/js/i18n.js' | relative_url }}"></script>
  <script src="{{ '/js/main.js' | relative_url }}"></script>
</body>
</html>
